name: Deploy zu All-Inkl (FTP)

# Lädt die Seite bei jedem Push auf main automatisch per FTP auf den
# All-Inkl-Webspace. Manueller Start ist über den Reiter "Actions" ->
# "Deploy zu All-Inkl (FTP)" -> "Run workflow" ebenfalls möglich.
#
# Benötigte GitHub-Secrets (Repo -> Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    z. B. w01xxxxx.kasserver.com   (aus dem KAS unter "FTP-Zugänge")
#   FTP_USERNAME  der FTP-Benutzername
#   FTP_PASSWORD  das FTP-Passwort
#
# Zielordner auf dem Webspace: Der FTP-Login landet im Account-Root
# (z. B. w021a97b/); die eigentliche Domain liegt eine Ebene tiefer im
# Ordner "neuroscanbalance-badessen.de/" -> daher server-dir unten fest gesetzt.
#
# Nach jedem erfolgreichen Deploy wird der Commit automatisch mit einem
# Zeitstempel-Tag markiert (live-JJJJ-MM-TT-HHMMSS, Zeitzone Berlin).
# Dadurch ist im Reiter "Tags" jederzeit nachvollziehbar, welche Version
# wann live gegangen ist – und ein Rollback ist gezielt möglich.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # nötig, um Release-Tags pushen zu können

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Per FTP hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /neuroscanbalance-badessen.de/
          protocol: ftps
          # Dev-/Repo-Dateien und Rohdaten nicht auf den Webspace laden
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.gitignore
            **/.DS_Store
            **/.claude/**
            **/Bilder/**
            **/README.md
            **/CLAUDE.md
            **/scripts/**
            blog/drafts/**
            test.html

      - name: Live-Version taggen (Zeitstempel)
        if: success()
        run: |
          TS=$(TZ=Europe/Berlin date +'%Y-%m-%d-%H%M%S')
          TAG="live-$TS"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Live-Deploy $TS (Europe/Berlin)"
          git push origin "$TAG"
          echo "Getaggt als: $TAG"
